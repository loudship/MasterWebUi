use_default_settings: true

server:
  # SearXNG's Docker entrypoint binds the uwsgi/gunicorn process on port 8080
  # regardless of this setting. Do NOT set port: 8082 here -- the process
  # supervisor ignores it and the container will only answer on 8080 internally.
  # The host-side mapping (8082:8080) is handled in docker-compose.yml.
  bind_address: "0.0.0.0"
  secret_key: "searxngsecret"
  # Internal DNS name used by other containers on llm-net resolves to port 8080
  base_url: http://searxng:8080/

search:
  formats:
    - html
    - json

engines:
  # Example Deep Web JSON Engine routing over Tor Proxy
  - name: hidden_example_db
    engine: json_engine
    search_url: "http://hidden-service.onion/api/search?q={query}"
    results_query: "results"
    url_query: "url"
    title_query: "title"
    content_query: "content"
    proxies:
      http: "socks5://tor-gateway:9050"
      https: "socks5://tor-gateway:9050"
    shortcut: hidden_db

  # Example XPath Engine routing over Tor Proxy
  - name: dark_academic_registry
    engine: xpath
    search_url: "http://academic-registry.onion/search?q={query}"
    results_xpath: "//div[@class='result']"
    url_xpath: ".//a/@href"
    title_xpath: ".//a/text()"
    content_xpath: ".//p[@class='summary']/text()"
    proxies:
      http: "socks5://tor-gateway:9050"
      https: "socks5://tor-gateway:9050"
