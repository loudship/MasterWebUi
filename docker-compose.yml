name: hardened-airgap-ai

x-core-environment: &core-environment
  NO_PROXY: localhost,127.0.0.1,postgres,qdrant,redis-hitl,inference-gateway,langgraph-orchestrator,pipelines,open-webui
  no_proxy: localhost,127.0.0.1,postgres,qdrant,redis-hitl,inference-gateway,langgraph-orchestrator,pipelines,open-webui

x-postgres-health-dependency: &postgres-health-dependency
  postgres:
    condition: service_healthy

x-qdrant-health-dependency: &qdrant-health-dependency
  qdrant:
    condition: service_healthy

x-airgap-dns: &airgap-dns
  - 127.0.0.1

services:
  postgres:
    image: postgres@sha256:df7bca0066e6f60cc3dd32faa70caddec20e2c22b58932f79498e5704b23854a
    pull_policy: never
    container_name: hardened-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in the operator environment}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the operator environment}
      POSTGRES_DB: postgres
      # Consumed by infra/postgres/init/002-create-telemetry-role.sh on first init.
      TELEMETRY_RO_PASSWORD: ${TELEMETRY_RO_PASSWORD:?Set TELEMETRY_RO_PASSWORD in the operator environment}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - llm-net
    dns: *airgap-dns
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant@sha256:45f8e3ddc2570a4d029877e1b5ec1045c19b3852b4e22a55c7f43b05aea0ca89
    pull_policy: never
    container_name: hardened-qdrant
    volumes:
      - ./data/qdrant:/qdrant/storage
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333;
          printf "GET /readyz HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3;
          head -n 1 <&3 | grep -q "200 OK"'
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - llm-net
    dns: *airgap-dns
    restart: unless-stopped

  redis-hitl:
    image: redis@sha256:09160599abd229764c0fb44cb6be640294e1d360a54b19985ab4843dcf2d90f1
    pull_policy: never
    container_name: redis-hitl
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory-policy
      - noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
    networks:
      - llm-net
    dns: *airgap-dns
    restart: unless-stopped

  redis-cache:
    profiles: [offline-tools]
    image: redis@sha256:09160599abd229764c0fb44cb6be640294e1d360a54b19985ab4843dcf2d90f1
    pull_policy: never
    container_name: redis-cache
    ports:
      - 127.0.0.1:6379:6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
    networks:
      - llm-net
    dns: *airgap-dns
    restart: unless-stopped

  redis-ui:
    profiles: [offline-tools]
    build:
      context: .
      dockerfile: services/redis-ui/Dockerfile
    image: redis-ui:local
    pull_policy: never
    container_name: redis-ui
    environment:
      REDIS_CACHE_URL: redis://redis-cache:6379/0
      REDIS_UI_MAX_VALUE_BYTES: "1048576"
      REDIS_UI_DB_PATH: /app/data/redis-console.db
      REDIS_UI_REPORT_RETENTION_DAYS: ${REDIS_UI_REPORT_RETENTION_DAYS:-30}
      REDIS_UI_REPORT_MAX_COUNT: ${REDIS_UI_REPORT_MAX_COUNT:-200}
      REDIS_UI_OVERVIEW_CACHE_TTL_S: ${REDIS_UI_OVERVIEW_CACHE_TTL_S:-10}
    depends_on:
      redis-cache:
        condition: service_healthy
    ports:
      - 127.0.0.1:5540:5540
    volumes:
      - redis-ui-data:/app/data
    networks:
      - llm-net
    dns: *airgap-dns
    restart: unless-stopped

  inference-gateway:
    build:
      context: .
      dockerfile: services/inference-gateway/Dockerfile
    image: inference-gateway:local
    pull_policy: never
    container_name: inference-gateway
    environment:
      <<: *core-environment
      UPSTREAM_BASE_URL: http://host.docker.internal:4321
      POSTGRES_OPS_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/ops
      MODEL_ALLOWLIST: ${MODEL_ALLOWLIST:?Set MODEL_ALLOWLIST to one or more approved LM Studio model IDs}
      UPSTREAM_TIMEOUT_S: ${UPSTREAM_TIMEOUT_S:-180}
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      <<: [*postgres-health-dependency, *qdrant-health-dependency]
    ports:
      - 127.0.0.1:4322:4321
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4321/health', timeout=4)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - llm-net
    dns: *airgap-dns
    restart: unless-stopped

  langgraph-orchestrator:
    build:
      context: .
      dockerfile: services/langgraph-orchestrator/Dockerfile
    image: langgraph-orchestrator:hardened
    pull_policy: never
    container_name: langgraph-orchestrator
    environment:
      <<: *core-environment
      QDRANT_URI: http://qdrant:6333
      QDRANT_NARRATIVE_ALIAS: narrative_active
      QDRANT_NARRATIVE_BOOTSTRAP_COLLECTION: primary_narrative
      REDIS_URL: redis://redis-hitl:6379/0
      INFERENCE_GATEWAY_URL: http://inference-gateway:4321
      POSTGRES_LANGGRAPH_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/langgraph
      POSTGRES_OPS_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/ops
      LANGGRAPH_STRICT_MSGPACK: "true"
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis-hitl:
        condition: service_healthy
      inference-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/health', timeout=4)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s
    networks:
      - llm-net
    dns: *airgap-dns
    restart: unless-stopped

  pipelines:
    build:
      context: .
      dockerfile: services/pipelines/Dockerfile
    image: pipelines:local
    pull_policy: never
    container_name: hardened-pipelines
    environment:
      <<: *core-environment
      PIPELINES_API_KEY: ${PIPELINES_API_KEY:?Set PIPELINES_API_KEY in the operator environment}
      LANGGRAPH_URL: http://langgraph-orchestrator:8100
      INFERENCE_GATEWAY_URL: http://inference-gateway:4321
    volumes:
      - ./pipelines/langgraph_router.py:/app/pipelines/langgraph_router.py:ro
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      inference-gateway:
        condition: service_healthy
      langgraph-orchestrator:
        condition: service_healthy
    healthcheck:
      # Assert the OpenAI-compatible contract Open WebUI depends on, not just
      # process liveness: /v1/models must answer with at least one model.
      test: ["CMD", "python", "-c", "import json,os,urllib.request; req=urllib.request.Request('http://127.0.0.1:9099/v1/models', headers={'Authorization': 'Bearer ' + os.environ['PIPELINES_API_KEY']}); body=json.load(urllib.request.urlopen(req, timeout=4)); assert body.get('data'), 'no pipeline models registered'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - llm-net
    dns: *airgap-dns
    restart: unless-stopped

  open-webui:
    image: open-webui:0.9.6@sha256:2ee1870d76187136f5f8620ecb7d13b36113098ad8b209852ab66d089486ca20
    pull_policy: never
    container_name: open-webui
    environment:
      <<: *core-environment
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/open_webui
      OPENAI_API_BASE_URL: http://pipelines:9099/v1
      OPENAI_API_BASE_URLS: http://pipelines:9099/v1
      OPENAI_API_KEYS: ${PIPELINES_API_KEY}
      ENABLE_OPENAI_API: "true"
      ENABLE_OLLAMA_API: "false"
      ENABLE_DIRECT_CONNECTIONS: "false"
      ENABLE_WEB_SEARCH: "true"
      WEB_SEARCH_ENGINE: "searxng"
      WEB_SEARCH_TRUST_ENV: "false"
      WEB_SEARCH_RESULT_COUNT: "3"
      WEB_SEARCH_CONCURRENT_REQUESTS: "1"
      WEB_LOADER_ENGINE: "safe_web"
      WEB_LOADER_CONCURRENT_REQUESTS: "1"
      SEARXNG_QUERY_URL: "http://searxng:8080/search"
      SEARXNG_LANGUAGE: "en"
      ENABLE_PERSISTENT_CONFIG: "true"
      ENABLE_API_KEYS: "true"
      # WebSocket transport for socket.io: long-polling degraded every tool
      # status event under load (audit P3-1). All binds are 127.0.0.1-only.
      ENABLE_WEBSOCKET_SUPPORT: "true"
      ENABLE_STAR_SESSIONS_MIDDLEWARE: "false"
      ENABLE_OTEL: "false"
      ENABLE_OTEL_TRACES: "false"
      ENABLE_OTEL_METRICS: "false"
      ENABLE_OTEL_LOGS: "false"
      VECTOR_DB: qdrant
      QDRANT_URI: http://qdrant:6333
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:?Set WEBUI_SECRET_KEY in the operator environment}
      UVICORN_WORKERS: "1"
      SCARF_NO_ANALYTICS: "true"
      DO_NOT_TRACK: "true"
      ANONYMIZED_TELEMETRY: "false"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      inference-gateway:
        condition: service_healthy
      langgraph-orchestrator:
        condition: service_healthy
      pipelines:
        condition: service_healthy
    ports:
      - 127.0.0.1:3000:8080
    volumes:
      - open-webui-data:/app/backend/data
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined
      - no-new-privileges:true
    networks:
      - llm-net
    dns: *airgap-dns
    restart: unless-stopped

  searxng:
    profiles: [offline-tools]
    image: searxng/searxng@sha256:d137e9b7877b7982c5e8ccf878fda0a05d3c8564ebace7f66424a5a19a3c29d9
    pull_policy: never
    container_name: searxng
    volumes:
      - ./data/searxng:/etc/searxng
    networks:
      - llm-net
    dns: *airgap-dns
    restart: unless-stopped

  crawl4ai:
    profiles: [offline-tools]
    image: unclecode/crawl4ai@sha256:b33e98fba44182409a99a84db655c152344be710e3bd9e97079004375a90148a
    pull_policy: never
    container_name: crawl4ai
    shm_size: 1g
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:11235/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - llm-net
    dns: *airgap-dns
    restart: unless-stopped

  browserless:
    profiles: [offline-tools]
    image: browserless/chrome@sha256:57d19e414d9fe4ae9d2ab12ba768c97f38d51246c5b31af55a009205c136012f
    pull_policy: never
    container_name: browserless
    environment:
      CONCURRENT: "1"
      QUEUED: "4"
      TIMEOUT: "60000"
    shm_size: 2g
    networks:
      - llm-net
    dns: *airgap-dns
    restart: unless-stopped

  docling-serve:
    profiles: [offline-tools]
    build:
      context: .
      dockerfile: services/docling-ui/Dockerfile
    image: docling-serve:local-ui
    pull_policy: never
    container_name: docling-serve
    environment:
      DOCLING_SERVE_ENABLE_UI: "true"
      DOCLING_SERVE_MAX_SYNC_WAIT: "300"
      GRADIO_ANALYTICS_ENABLED: "false"
      UVICORN_WORKERS: "1"
    ports:
      - 127.0.0.1:5001:5001
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5001/health', timeout=4)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    networks:
      - llm-net
    dns: *airgap-dns
    restart: unless-stopped

  deep-web-mcp:
    profiles: [offline-tools]
    build:
      context: .
      dockerfile: deep-web-mcp/Dockerfile
    image: deep-web-mcp:hardened
    pull_policy: never
    container_name: deep-web-mcp
    environment:
      <<: *core-environment
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/deep_web
      AES_SECRET_KEY: ${AES_SECRET_KEY:?Set AES_SECRET_KEY in the operator environment}
      ALLOWED_TARGET_HOSTS: ${ALLOWED_TARGET_HOSTS:-crawl4ai,searxng,browserless}
      ALLOW_PUBLIC_TARGETS: "false"
      SEARXNG_URL: http://searxng:8080
      PAGE_TIMEOUT_MS: ${DEEP_WEB_PAGE_TIMEOUT_MS:-45000}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      crawl4ai:
        condition: service_healthy
    networks:
      - llm-net
    dns: *airgap-dns
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=4)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  workspace-catalog:
    profiles: [offline-tools]
    build:
      context: .
      dockerfile: services/workspace-catalog/Dockerfile
    image: workspace-catalog:local
    pull_policy: never
    container_name: workspace-catalog
    environment:
      <<: *core-environment
      OWUI_BASE_URL: http://open-webui:8080
      OWUI_ADMIN_TOKEN: ${OPEN_WEBUI_API_KEY:-}
      PORT: "9080"
    depends_on:
      open-webui:
        condition: service_healthy
    ports:
      - 127.0.0.1:9080:9080
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9080/health', timeout=4)"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - llm-net
    dns: *airgap-dns
    mem_limit: 128m
    cpus: "0.25"
    restart: unless-stopped

  monitor-daemon:
    profiles: [offline-tools]
    build:
      context: .
      dockerfile: Dockerfile.monitor
    image: monitor-daemon:hardened
    pull_policy: never
    container_name: monitor-daemon
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${MONITOR_QDRANT_COLLECTION:-monitor_active}
      MCP_URL: http://deep-web-mcp:8000
      ORCHESTRATOR_URL: http://langgraph-orchestrator:8100
      SEARXNG_URL: http://searxng:8080
      CRAWL4AI_PROXY_URL: http://crawl4ai-proxy:8000
      OPEN_WEBUI_URL: http://open-webui:8080
      OPEN_WEBUI_API_KEY: ${OPEN_WEBUI_API_KEY:-}
      OPEN_WEBUI_PROMPT_MODEL_ID: ${OPEN_WEBUI_PROMPT_MODEL_ID:-qwen35}
      BROWSERLESS_URL: http://browserless:3000
      FIRECRAWL_URL: ${FIRECRAWL_URL:-}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}
      WEB_TOOLS_TIMEOUT_S: ${WEB_TOOLS_TIMEOUT_S:-90}
      MONITOR_DB_PATH: /app/data/control-center.db
      DIAGNOSTIC_RETENTION_DAYS: ${DIAGNOSTIC_RETENTION_DAYS:-30}
      DIAGNOSTIC_MAX_RUNS: ${DIAGNOSTIC_MAX_RUNS:-500}
      PROBE_CACHE_TTL_S: ${PROBE_CACHE_TTL_S:-15}
      POSTGRES_OPS_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/ops
      TRANSFORMERS_OFFLINE: "1"
      HF_DATASETS_OFFLINE: "1"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      deep-web-mcp:
        condition: service_healthy
    ports:
      - 127.0.0.1:19000:9000
    volumes:
      - monitor-daemon-data:/app/data
    networks:
      - llm-net
    dns: *airgap-dns
    restart: unless-stopped

  telemetry-gateway:
    profiles: [offline-tools]
    build:
      context: .
      dockerfile: services/telemetry-gateway/Dockerfile
    image: telemetry-gateway:local
    pull_policy: never
    container_name: telemetry-gateway
    environment:
      <<: *core-environment
      POSTGRES_OPS_URL: postgresql://telemetry_ro:${TELEMETRY_RO_PASSWORD:?Set TELEMETRY_RO_PASSWORD in the operator environment}@postgres:5432/ops
      OPEN_WEBUI_URL: http://open-webui:8080
      OPEN_WEBUI_API_KEY: ${OPEN_WEBUI_API_KEY:-}
      PYTHONUNBUFFERED: "1"
    secrets:
      - telemetry_token
    depends_on:
      postgres:
        condition: service_healthy
      open-webui:
        condition: service_healthy
    ports:
      - 127.0.0.1:19200:9200
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9200/health', timeout=4)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - llm-net
    dns: *airgap-dns
    mem_limit: 256m
    cpus: "0.5"
    pids_limit: 32
    read_only: true
    tmpfs:
      - /tmp:size=8m,noexec,nosuid
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  config-drift-monitor:
    profiles: [offline-tools]
    build:
      context: .
      dockerfile: services/config-drift-monitor/Dockerfile
    image: config-drift-monitor:local
    pull_policy: never
    container_name: config-drift-monitor
    environment:
      OPEN_WEBUI_URL: http://open-webui:8080
      OPEN_WEBUI_API_KEY: ${OPEN_WEBUI_API_KEY:-}
      CONFIG_DRIFT_BASELINE_PATH: /app/config/config-drift-baseline.yaml
      CONFIG_DRIFT_ADMIN_INTERVAL_S: ${CONFIG_DRIFT_ADMIN_INTERVAL_S:-30}
      CONFIG_DRIFT_WORKSPACE_INTERVAL_S: ${CONFIG_DRIFT_WORKSPACE_INTERVAL_S:-30}
      CONFIG_DRIFT_USER_INTERVAL_S: ${CONFIG_DRIFT_USER_INTERVAL_S:-60}
      CONFIG_DRIFT_CHAT_INTERVAL_S: ${CONFIG_DRIFT_CHAT_INTERVAL_S:-60}
      CONFIG_DRIFT_RECENT_CHAT_HOURS: ${CONFIG_DRIFT_RECENT_CHAT_HOURS:-24}
      CONFIG_DRIFT_CHATS_PER_USER: ${CONFIG_DRIFT_CHATS_PER_USER:-20}
      CONFIG_DRIFT_MAX_CHATS: ${CONFIG_DRIFT_MAX_CHATS:-100}
      CONFIG_DRIFT_TIMEOUT_S: ${CONFIG_DRIFT_TIMEOUT_S:-15}
    depends_on:
      open-webui:
        condition: service_healthy
    ports:
      - 127.0.0.1:19100:9100
    volumes:
      - ./config/config-drift-baseline.yaml:/app/config/config-drift-baseline.yaml:ro
    networks:
      - llm-net
    dns: *airgap-dns
    mem_limit: 512m
    cpus: "1.0"
    pids_limit: 64
    read_only: true
    tmpfs:
      - /tmp:size=16m,noexec,nosuid
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  state-migration:
    profiles: [migration]
    build:
      context: .
      dockerfile: migration/Dockerfile
    image: state-migration:local
    pull_policy: never
    environment:
      OPEN_WEBUI_POSTGRES_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/open_webui
      DEEP_WEB_POSTGRES_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/deep_web
      QDRANT_URL: http://qdrant:6333
      QDRANT_NARRATIVE_ALIAS: narrative_active
      QDRANT_NARRATIVE_BOOTSTRAP_COLLECTION: primary_narrative
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:?Set WEBUI_SECRET_KEY}
    volumes:
      - ./data:/migration-data:ro
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - llm-net
    dns: *airgap-dns

  qdrant-alias-cutover:
    profiles: [alias-cutover]
    image: state-migration:local
    pull_policy: never
    entrypoint: ["python", "/app/migration/qdrant_alias_cutover.py"]
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_ALIAS: ${QDRANT_ALIAS:-narrative_active}
      QDRANT_TARGET_COLLECTION: ${QDRANT_TARGET_COLLECTION:-}
      QDRANT_SNAPSHOT_CURRENT: ${QDRANT_SNAPSHOT_CURRENT:-true}
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - llm-net
    dns: *airgap-dns

networks:
  llm-net:
    name: llm-net
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "false"

volumes:
  postgres-data:
  open-webui-data:
    name: open-webui-live-data
  monitor-daemon-data:
    name: monitor-daemon-data
  redis-ui-data:
    name: redis-ui-data

secrets:
  telemetry_token:
    file: ./secrets/telemetry_token.txt
