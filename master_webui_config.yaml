# master_webui_config.yaml
# --------------------------------------------------------------------
# "Golden" configuration target for the optional sync tool (config_sync_broker.py).
# In the hardened stack the *runtime* source of truth is:
#   - docker-compose.yml environment blocks (and x- anchors)
#   - per-service Dockerfile ENV defaults
#   - services/config-drift-monitor + its config/config-drift-baseline.yaml
# This YAML is primarily consumed by the one-off sync script to POST values
# into a running Open WebUI instance for drift correction or initial apply.
# See test_web_search_defaults.py and the drift baseline metadata for precedence notes.
# --------------------------------------------------------------------

rag:
  CHUNK_SIZE: 1000
  CHUNK_OVERLAP: 100
  TOP_K: 3
  CONTENT_EXTRACTION_ENGINE: "" # Default to CPU-bound parsers to save VRAM

search:
  ENABLE_WEB_SEARCH: true
  WEB_SEARCH_ENGINE: "searxng"
  WEB_SEARCH_TRUST_ENV: false
  WEB_SEARCH_RESULT_COUNT: 3
  WEB_SEARCH_CONCURRENT_REQUESTS: 1
  WEB_LOADER_ENGINE: "safe_web"
  WEB_LOADER_CONCURRENT_REQUESTS: 1
  WEB_SEARCH_DOMAIN_FILTER_LIST:
    - "!cn"
    - "!baidu.com"
    - "!zhihu.com"
    - "!weibo.com"
    - "!sina.com.cn"
    - "!csdn.net"
    - "!163.com"
  SEARXNG_QUERY_URL: "http://searxng:8080/search"
  SEARXNG_LANGUAGE: "en"

models:
  DEFAULT_MODEL_PARAMS:
    system: "You are an agentic assistant. You must utilize provided tools efficiently, strictly answer the user's queries, and avoid context bloat."
    options:
      num_ctx: 16000

audio:
  tts:
    ENGINE: "openai"
    MODEL: "kokoro"
    VOICE: "af_heart"
    OPENAI_API_BASE_URL: "http://host.docker.internal:8880/v1"
    OPENAI_API_KEY: "sk-kokoro"
